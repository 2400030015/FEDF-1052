<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data_Types in JS</title>
</head>
<body>
    <h1>Data_Type Demo in JS</h1>
    <pre id="demo"></pre>
    <script>
        const a1 = 12;   // Number
        const a2 = "Dundi"; // String
        const a3 = true; // Boolean
        let a4;          // Undefined
        const a5 = null; // Null
        const a6 = 123522222244444444444444444444444444444435213333333333333333344n; // BigInt
        const a7 = Symbol("id"); // Symbol

        document.getElementById("demo").innerText = `
Number    = ${a1}   
String    = ${a2}   
Boolean   = ${a3}  
Undefined = ${a4}  
Null      = ${a5}   
BigInt    = ${a6}   
Symbol    = ${a7.toString()}  
`;
    </script>
</body>
</html>
