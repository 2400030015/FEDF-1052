<!DOCTYPE html>
<html lang="en">
<head>
    <title>Javascript session</title>
</head>
<body>
    <h1>Javascript variable demo</h1>
    <p id="demo"></p>

    <script>
        
        document.getElementById("demo").innerText= "Welcome to javascript session";

        let x = 10;
        let y = 20;

        
        document.getElementById("demo").innerText=(x);

        
        document.getElementById("demo").innerHTML ="y value: "+y;
    </script>
</body>
</html>
