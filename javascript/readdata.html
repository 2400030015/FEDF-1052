<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Data using DOM</title>
</head>
<body>
    <h1>Sum of 2 numbers</h1>
    <p id="demo"></p>
    <form >
        <label > Enter first Number1:</label>
        <input type="text" id="num1"/<></br>
         <label > Enter first Number2:</label>
        <input type="text" id="num2"/></br>
        <button type="button" onclick="sum()">ADD</button>
    </form> 
    <script>
        function sum()
        {
        let n1=parseInt(document.getElementById("num1").value);
        let n2=parseInt(document.getElementById("num2").value);
        let sum=n1+n2;
        document.getElementById("demo").innerHTML=`hello addition:${sum}`;
        console.log("sum="+sum);
        }
    </script>
</body>

</html>
