<!DOCTYPE html>

    <title>set Demo</title>

<body>
    <h1>sets demo</h1>
    <p id="demo"></p>
    <script>
        let numbers=new Set([10,20,30,20]);
        document.getElementById("demo").innerHTML+="set Elements  after are<br/>";
       for (let x of numbers)
        document.getElementById("demo").innerHTML+=x+"<br/>";
       numbers.add(45);
       document.getElementById("demo").innerHTML+="set Elements  after are<br/>";
        for (let x of numbers)
        document.getElementById("demo").innerHTML+=x+"<br/>";
       
    </script>
    

    <p id="demo"></p>

        console.log(obj.get("id"));
    </script>
